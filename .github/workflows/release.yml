name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build CLI
        run: cargo build --release --target ${{ matrix.target }} -p seventeenlands-rust

      - name: Package (unix)
        if: runner.os != 'Windows'
        run: |
          bin=target/${{ matrix.target }}/release/seventeenlands
          tar -czf seventeenlands-rust-${{ matrix.target }}.tar.gz -C "$(dirname "$bin")" seventeenlands

      - name: Package (windows)
        if: runner.os == 'Windows'
        run: |
          $bin = "target/${{ matrix.target }}/release/seventeenlands.exe"
          Compress-Archive -Path $bin -DestinationPath "seventeenlands-rust-${{ matrix.target }}.zip"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: seventeenlands-rust-${{ matrix.target }}
          path: seventeenlands-rust-${{ matrix.target }}.*

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
