# Builds the macOS universal desktop .dmg for a `v*` tag and attaches it to the same
# GitHub release that release.yml publishes the CLI tarballs to. Kept as a separate
# workflow so a Tauri/bundling failure never blocks the CLI release, and so the .dmg
# can be rebuilt on its own via workflow_dispatch.
#
# Both workflows use softprops/action-gh-release, which creates the tag's release if it
# doesn't exist yet and appends assets if it does — so the two runs can finish in either
# order. Only release.yml generates the release notes.
name: Release Desktop

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  desktop:
    name: desktop bundle (macos universal)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      - name: Build universal .dmg
        working-directory: crates/desktop
        run: cargo tauri build --target universal-apple-darwin --bundles dmg

      - name: Stage .dmg under a stable name
        run: |
          dmg="$(find target/universal-apple-darwin/release/bundle/dmg -name '*.dmg' | head -n1)"
          test -n "$dmg" || { echo "no .dmg produced"; exit 1; }
          mkdir -p dist
          cp "$dmg" "dist/17Lands-universal.dmg"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: seventeenlands-desktop-universal
          path: dist/17Lands-universal.dmg

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/17Lands-universal.dmg

  # Push the cask bump to fredoliveira/homebrew-tap. Needs a TAP_PUSH_TOKEN secret
  # (fine-grained PAT with contents:write on the tap repo); skips quietly if unset.
  tap:
    name: Bump Homebrew cask
    needs: [desktop]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: seventeenlands-desktop-universal
          path: dist

      - name: Regenerate cask and push to the tap
        env:
          TAP_PUSH_TOKEN: ${{ secrets.TAP_PUSH_TOKEN }}
        run: |
          if [ -z "$TAP_PUSH_TOKEN" ]; then
            echo "TAP_PUSH_TOKEN secret not set; skipping tap bump"
            exit 0
          fi
          version="${GITHUB_REF_NAME#v}"
          sha="$(shasum -a 256 dist/17Lands-universal.dmg | cut -d' ' -f1)"
          git clone "https://x-access-token:${TAP_PUSH_TOKEN}@github.com/fredoliveira/homebrew-tap.git" tap
          mkdir -p tap/Casks
          sh packaging/homebrew/generate.sh cask "$version" "$sha" \
            > tap/Casks/seventeenlands-desktop.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/seventeenlands-desktop.rb
          git commit -m "seventeenlands-desktop ${version}"
          # The CLI workflow may push its formula bump concurrently; rebase and retry.
          for _ in 1 2 3; do git push && break; git pull --rebase; done
